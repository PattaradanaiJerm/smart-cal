services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: smart-calculator:latest
    container_name: smart-calculator
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Site ──────────────────────────────────────────
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://smartcalc.app}

      # ── Supabase ──────────────────────────────────────
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # ── Google AdSense ────────────────────────────────
      NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}

      # ── Ad Slots ─────────────────────────────────────
      NEXT_PUBLIC_AD_SLOT_TOP_BANNER: ${NEXT_PUBLIC_AD_SLOT_TOP_BANNER:-}
      NEXT_PUBLIC_AD_SLOT_IN_CONTENT_TOP: ${NEXT_PUBLIC_AD_SLOT_IN_CONTENT_TOP:-}
      NEXT_PUBLIC_AD_SLOT_IN_CONTENT_MID: ${NEXT_PUBLIC_AD_SLOT_IN_CONTENT_MID:-}
      NEXT_PUBLIC_AD_SLOT_RIGHT_SIDEBAR: ${NEXT_PUBLIC_AD_SLOT_RIGHT_SIDEBAR:-}
      NEXT_PUBLIC_AD_SLOT_BELOW_RESULT: ${NEXT_PUBLIC_AD_SLOT_BELOW_RESULT:-}
      NEXT_PUBLIC_AD_SLOT_FOOTER: ${NEXT_PUBLIC_AD_SLOT_FOOTER:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/th"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
